# ──────────────────────────────────────────────
# FinTrack — Docker Compose
#
# Serviços disponíveis:
#   Meses 1–6:  PostgreSQL
#   Mês 7:      + Zookeeper + Kafka (descomente a seção)
#   Mês 8:      + pipeline CI/CD (GitHub Actions, sem docker-compose)
#   Mês 9:      + Redis + Prometheus + Grafana (descomente a seção)
#
# Como usar:
#   docker-compose up -d          → sobe todos os serviços ativos
#   docker-compose logs -f app    → acompanha logs da aplicação
#   docker-compose down -v        → para e remove volumes (limpa dados)
# ──────────────────────────────────────────────

services:

  # ──────────────────────────────────────────────
  # POSTGRESQL — Banco principal
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintrack-postgres
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrack-network

  # ──────────────────────────────────────────────
  # APLICAÇÃO SPRING BOOT
  # Descomente quando quiser rodar tudo via Docker.
  # Durante desenvolvimento, rode a app direto na IDE.
  # ──────────────────────────────────────────────
