  #   build: .
  #   container_name: fintrack-app
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fintrack
  #     SPRING_DATASOURCE_USERNAME: fintrack
  #     SPRING_DATASOURCE_PASSWORD: fintrack
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - fintrack-network

  # ──────────────────────────────────────────────
  # MÊS 7: KAFKA
  # Descomente esta seção inteira quando chegar no Mês 7
  # ──────────────────────────────────────────────
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   container_name: fintrack-zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #   networks:
  #     - fintrack-network
  #
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   container_name: fintrack-kafka
  #   depends_on: [zookeeper]
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  #   networks:
  #     - fintrack-network
  #
  # kafka-ui:
  #   image: provectuslabs/kafka-ui:latest
  #   container_name: fintrack-kafka-ui
  #   ports:
  #     - "8090:8080"
  #   environment:
  #     KAFKA_CLUSTERS_0_NAME: local
  #     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
  #   depends_on: [kafka]
  #   networks:
  #     - fintrack-network

  # ──────────────────────────────────────────────
  # MÊS 9: REDIS + PROMETHEUS + GRAFANA
